<style>
  :root {
    --bg: #0a0c10;
    --surface: #14161f;
    --surface-hover: #1a1d28;
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.12);
    --text: #e8eaf0;
    --text-dim: #5a6078;
    --border: #1e2230;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #22c55e;
    --purple: #a855f7;
    --blue: #3b82f6;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    height: 100%;
    overflow: hidden;
  }

  /* App shell */
  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 600px;
    margin: 0 auto;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .topbar h1 { font-size: 18px; font-weight: 800; }
  .topbar .sub { font-size: 11px; color: var(--text-dim); }
  .mode-toggle {
    display: flex;
    background: var(--surface);
    border-radius: 8px;
    padding: 3px;
    gap: 3px;
  }
  .mode-btn {
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  /* Scrollable content */
  .content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 16px 80px;
    -webkit-overflow-scrolling: touch;
  }
  .content::-webkit-scrollbar { width: 0; }

  /* Day selector pills */
  .day-pills {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 12px;
    margin-bottom: 8px;
    scrollbar-width: none;
  }
  .day-pills::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .day-pill.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }
  .day-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .dot.done { background: var(--success); }
  .dot.todo { background: var(--warning); }
  .dot.rest { background: var(--text-dim); }

  /* Week selector */
  .week-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 8px 0 16px;
  }
  .week-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .week-btn:active { background: var(--surface-hover); }
  .week-label { font-size: 14px; font-weight: 700; min-width: 80px; text-align: center; }

  /* Exercise card */
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .ex-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .ex-name { font-size: 15px; font-weight: 700; }
  .ex-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .ex-rm {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  /* Set inputs */
  .sets-row {
    display: flex;
    gap: 8px;
  }
  .set-box {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }
  .set-box label {
    display: block;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .set-box input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    padding: 4px 0;
    outline: none;
    -moz-appearance: textfield;
  }
  .set-box input::-webkit-outer-spin-button,
  .set-box input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .set-box input::placeholder { color: var(--text-dim); opacity: 0.4; }
  .set-box input:focus {
    border-bottom: 2px solid var(--accent);
  }
  .set-box .unit {
    font-size: 10px;
    color: var(--text-dim);
  }

  /* RPE slider */
  .rpe-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .rpe-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .rpe-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
  }
  .rpe-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--warning);
    cursor: pointer;
  }
  .rpe-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--warning);
    min-width: 28px;
    text-align: right;
  }

  /* Bottom action bar */
  .action-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    max-width: 600px;
    margin: 0 auto;
  }
  .btn-primary {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #000;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:active { opacity: 0.8; }
  .btn-secondary {
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  /* DASHBOARD VIEW */
  .dash-kpi {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .kpi-mini {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
  }
  .kpi-mini .val {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
  }
  .kpi-mini .lbl {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .chart-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .chart-box h3 {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Heatmap compact */
  .hm-grid {
    display: grid;
    grid-template-columns: 30px repeat(6, 1fr);
    gap: 2px;
  }
  .hm-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 600;
  }
  .hm-label {
    font-size: 9px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Hidden */
  .hidden { display: none !important; }
</style>
<base target="_blank">

<div class="app">

    <div>
      <h1>Iron Log</h1>

    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('log')" id="btnLog">Log</button>
      <button class="mode-btn" onclick="setMode('view')" id="btnView">View</button>
    </div>
  </div>

  <div class="content" id="content">

      </div>

      <div id="exerciseList"></div>
    </div>

    <!-- VIEW MODE -->
    <div id="viewMode" class="hidden">
      <div class="dash-kpi">
        <div class="kpi-mini"><div class="val" id="vSessions">1</div><div class="lbl">Sessions</div></div>
        <div class="kpi-mini"><div class="val" id="vVolume">22</div><div class="lbl">Sets</div></div>

        <div class="kpi-mini"><div class="val" id="vRPE">—</div><div class="lbl">Avg RPE</div></div>
        <div class="kpi-mini"><div class="val" id="vStreak">1</div><div class="lbl">Streak</div></div>
      </div>

      <div class="chart-box">
        <h3>Training Heatmap</h3>
        <div class="hm-grid" id="heatmap"></div>
      </div>

      <div class="chart-box">
        <h3>Weekly Volume</h3>
        <canvas id="volChart" height="140"></canvas>
      </div>

      <div class="chart-box">
        <h3>Key Lifts</h3>
        <canvas id="liftChart" height="140"></canvas>
      </div>
    </div>
  </div>

  <div class="action-bar" id="actionBar">
    <button class="btn-primary" onclick="saveSession()">💾 Save Session</button>
    <button class="btn-secondary" onclick="syncToSheets()">↻ Sync</button>
  </div>
</div>

<div class="toast" id="toast">Saved!</div>

// ============================================================================
// STATE
// ============================================================================
let currentWeek = 1;
let currentDay = 'Day 1 - Lower A';
let mode = 'log';
let localData = JSON.parse(localStorage.getItem('ironLogData') || '{}');

const dayNames = {
  'Day 1 - Lower A': 'Lower A',
  'Day 2 - Upper A': 'Upper A', 
  'Day 3 - Condition': 'Condition',
  'Day 4 - Zone 2': 'Zone 2',
  'Day 5 - Lower B': 'Lower B',
  'Day 6 - Upper B': 'Upper B'
};

// ============================================================================
// INIT
// ============================================================================
function init() {
  renderDayPills();
  renderExercises();
  renderDashboard();
}

// ============================================================================
// MODE SWITCH
// ============================================================================
function setMode(m) {
  mode = m;
  document.getElementById('btnLog').classList.toggle('active', m === 'log');
  document.getElementById('btnView').classList.toggle('active', m === 'view');
  document.getElementById('logMode').classList.toggle('hidden', m !== 'log');
  document.getElementById('viewMode').classList.toggle('hidden', m !== 'view');
  document.getElementById('actionBar').classList.toggle('hidden', m !== 'log');
  if (m === 'view') renderDashboard();
}

// ============================================================================
// DAY PILLS
// ============================================================================
function renderDayPills() {
  const container = document.getElementById('dayPills');
  container.innerHTML = Object.keys(dayNames).map(key => {
    const dayData = PROGRAM.days[key];
    const hasData = Object.values(dayData.weeks).some(w => 
      w.exercises.some(e => e.sets && e.sets.length > 0)
    );
    const dotClass = hasData ? 'done' : (key.includes('Zone') ? 'rest' : 'todo');
    const active = key === currentDay ? 'active' : '';
    return `<div class="day-pill ${active}" onclick="selectDay('${key}')">
      <span class="dot ${dotClass}"></span>${dayNames[key]}
    </div>`;
  }).join('');
}

function selectDay(key) {
  currentDay = key;
  renderDayPills();
  renderExercises();
}

// ============================================================================
// WEEK NAV
// ============================================================================
function changeWeek(delta) {
  currentWeek = Math.max(1, Math.min(12, currentWeek + delta));
  document.getElementById('weekLabel').textContent = 'Week ' + currentWeek;
  document.getElementById('headerWeek').textContent = currentWeek;
  renderExercises();
}

// ============================================================================
// EXERCISE INPUTS
// ============================================================================
function renderExercises() {
  const container = document.getElementById('exerciseList');
  const dayData = PROGRAM.days[currentDay];
  const weekData = dayData.weeks[currentWeek] || dayData.weeks['1'] || {exercises: []};

  container.innerHTML = weekData.exercises.map((ex, idx) => {
    const saved = localData[`${currentDay}_W${currentWeek}_${ex.name}`] || {};

    let setsHtml = '';
    const numSets = ex.target ? parseInt(ex.target.split('x')[0]) || 3 : 3;

    for (let s = 0; s < numSets; s++) {
      const sw = saved[`s${s}_w`] || '';
      const sr = saved[`s${s}_r`] || '';
      setsHtml += `
        <div class="set-box">
          <label>Set ${s+1}</label>
          <input type="number" inputmode="decimal" placeholder="0" 
            value="${sw}" id="w_${idx}_${s}" onchange="markDirty()">
          <div class="unit">kg</div>
          <input type="number" inputmode="numeric" placeholder="0" 
            value="${sr}" id="r_${idx}_${s}" onchange="markDirty()" 
            style="font-size:14px;font-weight:600;color:var(--text-dim);margin-top:4px;">
          <div class="unit">reps</div>
        </div>`;
    }

    const rpeVal = saved.rpe || 7;

    return `
      <div class="ex-card">
        <div class="ex-header">
          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-meta">${ex.target} · ${ex.category}</div>
          </div>
          <div class="ex-rm">${ex.rm ? ex.rm + 'kg' : ''}</div>
        </div>
        <div class="sets-row">${setsHtml}</div>
        <div class="rpe-row">
          <span class="rpe-label">RPE</span>
          <input type="range" min="4" max="10" step="0.5" value="${rpeVal}" 
            class="rpe-slider" id="rpe_${idx}" oninput="updateRPEDisplay(${idx})" onchange="markDirty()">
          <span class="rpe-value" id="rpev_${idx}">${rpeVal}</span>
        </div>
      </div>`;
  }).join('');
}

function updateRPEDisplay(idx) {
  const val = document.getElementById(`rpe_${idx}`).value;
  document.getElementById(`rpev_${idx}`).textContent = val;
}

let isDirty = false;
function markDirty() { isDirty = true; }

// ============================================================================
// SAVE
// ============================================================================
function saveSession() {
  const dayData = PROGRAM.days[currentDay];
  const weekData = dayData.weeks[currentWeek] || dayData.weeks['1'] || {exercises: []};

  weekData.exercises.forEach((ex, idx) => {
    const key = `${currentDay}_W${currentWeek}_${ex.name}`;
    const saved = localData[key] || {};
    const numSets = ex.target ? parseInt(ex.target.split('x')[0]) || 3 : 3;

    for (let s = 0; s < numSets; s++) {
      const w = document.getElementById(`w_${idx}_${s}`)?.value;
      const r = document.getElementById(`r_${idx}_${s}`)?.value;
      if (w !== undefined) saved[`s${s}_w`] = w;
      if (r !== undefined) saved[`s${s}_r`] = r;
    }
    saved.rpe = document.getElementById(`rpe_${idx}`)?.value || 7;
    localData[key] = saved;
  });

  localStorage.setItem('ironLogData', JSON.stringify(localData));
  isDirty = false;
  showToast('💾 Session saved locally');
}

// ============================================================================
// DASHBOARD
// ============================================================================
function renderDashboard() {
  // KPIs
  document.getElementById('vSessions').textContent = PROGRAM.dashboard.total_sessions;
  document.getElementById('vVolume').textContent = PROGRAM.dashboard.total_volume;
  document.getElementById('vBest').textContent = PROGRAM.dashboard.best_1rm;
  document.getElementById('vAdherence').textContent = '17%';
  document.getElementById('vRPE').textContent = PROGRAM.dashboard.avg_rpe || '—';
  document.getElementById('vStreak').textContent = '1';

  // Heatmap
  const hm = document.getElementById('heatmap');
  hm.innerHTML = '<div class="hm-label"></div>';
  ['M','T','W','T','F','S'].forEach(d => hm.innerHTML += `<div class="hm-label">${d}</div>`);
  PROGRAM.dashboard.weekly_volume.forEach(wv => {
    hm.innerHTML += `<div class="hm-label">W${wv.week}</div>`;
    for (let d = 1; d <= 6; d++) {
      const val = wv[`d${d}`];
      const intensity = val > 0 ? Math.min(val / 25, 1) : 0;
      const color = val > 0 ? `rgba(0,212,170,${0.15 + intensity * 0.7})` : 'rgba(30,34,48,0.5)';
      const tc = intensity > 0.4 ? '#0a0c10' : 'var(--text-dim)';
      hm.innerHTML += `<div class="hm-cell" style="background:${color};color:${tc}">${val || ''}</div>`;
    }
  });

  // Volume chart
  const volCtx = document.getElementById('volChart');
  if (volCtx) {
    const weeks = PROGRAM.dashboard.weekly_volume.map(w => `W${w.week}`);
    const totals = PROGRAM.dashboard.weekly_volume.map(w => w.total);
    new Chart(volCtx, {
      type: 'bar',
      data: { labels: weeks, datasets: [{ data: totals, backgroundColor: '#00d4aa', borderRadius: 4, barPercentage: 0.6 }] },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#5a6078', font: { size: 9 } } }, y: { grid: { color: '#1e2230' }, ticks: { color: '#5a6078', font: { size: 9 } } } } }
    });
  }

  // Lift chart
  const liftCtx = document.getElementById('liftChart');
  if (liftCtx) {
    const weeks = PROGRAM.dashboard.key_lifts.map(w => `W${w.week}`);
    new Chart(liftCtx, {
      type: 'line',
      data: {
        labels: weeks,
        datasets: [
          { label: 'Zercher', data: PROGRAM.dashboard.key_lifts.map(w => w.zercher_squat || null), borderColor: '#00d4aa', tension: 0.3, pointRadius: 3, spanGaps: true },
          { label: 'RDL', data: PROGRAM.dashboard.key_lifts.map(w => w.rdl || null), borderColor: '#3b82f6', tension: 0.3, pointRadius: 3, spanGaps: true }
        ]
      },
      options: { responsive: true, plugins: { legend: { labels: { color: '#5a6078', font: { size: 10 }, boxWidth: 8 } } }, scales: { x: { grid: { display: false }, ticks: { color: '#5a6078', font: { size: 9 } } }, y: { grid: { color: '#1e2230' }, ticks: { color: '#5a6078', font: { size: 9 } } } } }
    });
  }
}

// ============================================================================
// TOAST
// ============================================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
