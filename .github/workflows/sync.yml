name: Sync & Deploy
on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:       # Manual trigger
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update data from Google Sheets
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/${{ secrets.2PACX-1vT-ubntZvT0qxMP9Av32E2l8W5tie4omEt8GCA-uR0cpPAq71Sa27HQX2wwaEnXOPVxltjrkj80myZB }}/gviz/tq?tqx=out:json" -o data.json
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync from Google Sheets"
          git push
